<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Clone — Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; font-family: system-ui, sans-serif; }
    #app { width: 100vw; height: 100vh; display: block; }
    canvas { display: block; }

    /* Réticule au centre de l'écran */
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 20px; height: 20px; pointer-events: none; z-index: 10;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.6);
    }
    #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
    #crosshair::after { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

    /* Barre d'inventaire (hotbar) */
    #hotbar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; padding: 4px; background: rgba(0, 0, 0, 0.35);
      border-radius: 6px; z-index: 10; pointer-events: none;
    }
    .slot {
      width: 50px; height: 50px; border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 4px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; position: relative;
      background: rgba(255, 255, 255, 0.08);
    }
    .slot.active { border-color: #fff; box-shadow: 0 0 8px rgba(255, 255, 255, 0.6); }
    .slot .swatch { width: 30px; height: 30px; border-radius: 3px; image-rendering: pixelated; }
    .slot .key { position: absolute; top: 1px; left: 3px; font-size: 10px; color: #fff; opacity: 0.7; }
    .slot .name { position: absolute; bottom: 1px; font-size: 8px; color: #fff; opacity: 0.8; }

    /* Overlay de démarrage / pause */
    #overlay {
      position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: rgba(0, 0, 0, 0.55); color: #fff; text-align: center; cursor: pointer;
    }
    #overlay h1 { font-size: 40px; letter-spacing: 2px; text-shadow: 2px 2px 0 #333; }
    #overlay .play { font-size: 20px; padding: 10px 24px; border: 2px solid #fff; border-radius: 6px; }
    #overlay .help { font-size: 14px; line-height: 1.8; opacity: 0.9; max-width: 520px; }
    #overlay.hidden { display: none; }

    /* Indicateur FPS */
    #hud {
      position: fixed; top: 8px; left: 8px; z-index: 10; color: #fff; font-size: 13px;
      font-family: monospace; text-shadow: 1px 1px 0 #000; pointer-events: none; line-height: 1.5;
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="crosshair"></div>
  <div id="hotbar"></div>
  <div id="hud"></div>

  <div id="overlay">
    <h1>MINECRAFT CLONE</h1>
    <div class="play">▶ Cliquer pour jouer</div>
    <div class="help">
      <strong>WASD</strong> se déplacer &nbsp;·&nbsp; <strong>Souris</strong> regarder &nbsp;·&nbsp;
      <strong>Espace</strong> sauter &nbsp;·&nbsp; <strong>Clic gauche</strong> casser &nbsp;·&nbsp;
      <strong>Clic droit</strong> poser<br />
      <strong>1–9 / molette</strong> choisir un bloc &nbsp;·&nbsp; <strong>F</strong> mode vol (créatif) &nbsp;·&nbsp;
      <strong>Échap</strong> pause
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
