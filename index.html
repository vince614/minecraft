<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Clone — Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb;
      font-family: 'Trebuchet MS', system-ui, sans-serif; user-select: none; }
    canvas { display: block; }
    #app { width: 100vw; height: 100vh; display: block; }
    .hidden { display: none !important; }

    /* ---- Réticule ---- */
    #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 20px; height: 20px; pointer-events: none; z-index: 10; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute;
      background: rgba(255,255,255,0.85); box-shadow: 0 0 2px rgba(0,0,0,0.6); }
    #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
    #crosshair::after { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

    /* ---- HUD ---- */
    #hud { position: fixed; top: 8px; left: 8px; z-index: 10; color: #fff; font-size: 13px;
      font-family: monospace; text-shadow: 1px 1px 0 #000; pointer-events: none; line-height: 1.5; }

    /* ---- Hotbar ---- */
    #hotbar { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,0.35);
      border-radius: 6px; z-index: 10; pointer-events: none; }
    .slot { width: 50px; height: 50px; border: 2px solid rgba(255,255,255,0.25);
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
      position: relative; background: rgba(255,255,255,0.08); }
    .slot.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.6); }
    .slot .swatch { width: 32px; height: 32px; border-radius: 3px; image-rendering: pixelated;
      border: 1px solid rgba(0,0,0,0.3); }
    .slot .key { position: absolute; top: 0px; left: 3px; font-size: 10px; color: #fff; opacity: 0.7; }
    .slot .count { position: absolute; bottom: 1px; right: 3px; font-size: 12px; color: #fff;
      font-weight: bold; text-shadow: 1px 1px 0 #000; }
    .slot .name { position: absolute; bottom: 1px; left: 0; right: 0; text-align: center;
      font-size: 8px; color: #fff; opacity: 0.85; pointer-events: none; }

    /* ---- Écrans plein écran (menu, pause, inventaire) ---- */
    .screen { position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px; color: #fff; text-align: center; }
    .screen.hidden { display: none; }

    /* Fond dégradé « ciel » animé pour le menu principal */
    #menu { background: linear-gradient(160deg, #6cb5e8 0%, #9fd0f0 45%, #cfeafc 100%); }
    #pause, #inventory { background: rgba(0,0,0,0.55); backdrop-filter: blur(2px); }

    .title { font-size: 54px; letter-spacing: 4px; color: #f4f4f4;
      text-shadow: 3px 3px 0 #2b2b2b, 0 0 18px rgba(0,0,0,0.3); }
    .subtitle { font-size: 16px; opacity: 0.85; margin-top: -12px; color: #2b3b2b; }

    .menu-buttons { display: flex; flex-direction: column; gap: 12px; width: 320px; }
    .btn { font-size: 18px; padding: 12px 18px; color: #fff; cursor: pointer;
      background: linear-gradient(#7a7a7a, #5e5e5e); border: 2px solid #2b2b2b;
      border-bottom-width: 4px; border-radius: 4px; text-shadow: 1px 1px 0 #222;
      transition: filter .1s; }
    .btn:hover { filter: brightness(1.12); }
    .btn:active { border-bottom-width: 2px; transform: translateY(2px); }
    .btn.primary { background: linear-gradient(#5aa64a, #3f8a34); }

    /* Panneau d'options */
    .options { display: flex; flex-direction: column; gap: 18px; width: 420px;
      background: rgba(0,0,0,0.35); padding: 24px; border-radius: 8px; border: 2px solid #2b2b2b; }
    .option { display: flex; flex-direction: column; gap: 6px; text-align: left; }
    .option label { font-size: 14px; display: flex; justify-content: space-between; }
    .option input[type=range] { width: 100%; }
    .help { font-size: 13px; line-height: 1.9; opacity: 0.9; max-width: 560px;
      background: rgba(0,0,0,0.25); padding: 12px 18px; border-radius: 6px; }

    /* ---- Inventaire / craft ---- */
    .inv-window { background: #c6c6c6; border: 4px solid #373737; border-radius: 4px;
      padding: 16px; display: flex; flex-direction: column; gap: 14px; color: #222;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .inv-title { font-weight: bold; font-size: 15px; color: #333; text-align: left; }
    .craft-area { display: flex; align-items: center; gap: 16px; justify-content: center; }
    .grid { display: grid; gap: 4px; }
    .iv-slot { width: 46px; height: 46px; background: #8b8b8b; border: 2px solid #373737;
      box-shadow: inset 2px 2px 0 #5a5a5a, inset -2px -2px 0 #c9c9c9;
      position: relative; cursor: pointer; }
    .iv-slot:hover { background: #9d9d9d; }
    .iv-slot .swatch { position: absolute; inset: 7px; border-radius: 2px; image-rendering: pixelated;
      border: 1px solid rgba(0,0,0,0.35); }
    .iv-slot .count { position: absolute; bottom: 0px; right: 3px; font-size: 13px; font-weight: bold;
      color: #fff; text-shadow: 1px 1px 0 #000; }
    .craft-arrow { font-size: 32px; color: #373737; }
    .result-slot { width: 56px; height: 56px; }
    .inv-rows { display: flex; flex-direction: column; gap: 10px; }
    #inv-hotbar.grid { grid-template-columns: repeat(9, 46px); }
    #inv-main.grid { grid-template-columns: repeat(9, 46px); grid-template-rows: repeat(3, 46px); }

    /* Pile « tenue » par le curseur */
    #cursor-stack { position: fixed; width: 40px; height: 40px; pointer-events: none; z-index: 50;
      transform: translate(-50%, -50%); display: none; }
    #cursor-stack .swatch { position: absolute; inset: 0; border-radius: 2px; image-rendering: pixelated;
      border: 1px solid rgba(0,0,0,0.4); }
    #cursor-stack .count { position: absolute; bottom: -2px; right: 0; font-size: 13px; font-weight: bold;
      color: #fff; text-shadow: 1px 1px 0 #000; }
  </style>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="crosshair"></div>
  <div id="hud"></div>
  <div id="hotbar"></div>

  <!-- ===================== MENU PRINCIPAL ===================== -->
  <div id="menu" class="screen">
    <div id="menu-main" class="menu-view">
      <div class="title">MINECRAFT CLONE</div>
      <div class="subtitle">Three.js · moteur voxel</div>
      <div class="menu-buttons">
        <button class="btn primary" data-action="play">▶ Jouer</button>
        <button class="btn" data-action="options">⚙ Options</button>
      </div>
      <div class="help">
        <strong>WASD</strong> se déplacer · <strong>Souris</strong> regarder · <strong>Espace</strong> sauter ·
        <strong>Clic G</strong> casser · <strong>Clic D</strong> poser<br />
        <strong>1–9 / molette</strong> bloc · <strong>E</strong> inventaire · <strong>F</strong> vol ·
        <strong>F5</strong> 3<sup>e</sup> personne · <strong>Échap</strong> pause
      </div>
    </div>

    <div id="menu-options" class="menu-view options hidden">
      <div class="inv-title" style="color:#fff">Options</div>
      <div class="option">
        <label><span>Distance de rendu</span><span id="opt-rd-val">8</span></label>
        <input type="range" id="opt-rd" min="4" max="12" step="1" value="8" />
      </div>
      <div class="option">
        <label><span>Sensibilité souris</span><span id="opt-sens-val">1.0</span></label>
        <input type="range" id="opt-sens" min="0.3" max="3" step="0.1" value="1.0" />
      </div>
      <div class="option">
        <label><span>Champ de vision (FOV)</span><span id="opt-fov-val">75</span></label>
        <input type="range" id="opt-fov" min="60" max="100" step="1" value="75" />
      </div>
      <div class="option">
        <label><span>Volume</span><span id="opt-vol-val">70%</span></label>
        <input type="range" id="opt-vol" min="0" max="1" step="0.05" value="0.7" />
      </div>
      <button class="btn" data-action="options-back">Retour</button>
    </div>
  </div>

  <!-- ===================== MENU PAUSE ===================== -->
  <div id="pause" class="screen hidden">
    <div class="title" style="font-size:42px">PAUSE</div>
    <div class="menu-buttons">
      <button class="btn primary" data-action="resume">Reprendre</button>
      <button class="btn" data-action="pause-options">⚙ Options</button>
      <button class="btn" data-action="quit">Menu principal</button>
    </div>
  </div>

  <!-- ===================== INVENTAIRE / CRAFT ===================== -->
  <div id="inventory" class="screen hidden">
    <div class="inv-window">
      <div class="inv-title" id="inv-heading">Inventaire</div>
      <div class="craft-area">
        <div id="craft-grid" class="grid"></div>
        <div class="craft-arrow">➜</div>
        <div id="craft-result"></div>
      </div>
      <div class="inv-rows">
        <div id="inv-main" class="grid"></div>
        <div id="inv-hotbar" class="grid"></div>
      </div>
    </div>
  </div>

  <div id="cursor-stack"><span class="swatch"></span><span class="count"></span></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
